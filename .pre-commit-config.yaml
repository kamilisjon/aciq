repos:
  - repo: local
    hooks:
      - id: typos
        name: typos
        entry: typos .
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff
        name: ruff
        entry: ruff check .
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff_format
        name: ruff format
        entry: ruff format --check
        language: system
        always_run: true
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        always_run: true
        pass_filenames: false
      - id: tests
        name: tests suite
        entry: pytest test/
        language: system
        always_run: true
        pass_filenames: false